<!DOCTYPE html>
<html>
<head>
    <title>Spotify Hit Maker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 40px; }
        .container { max-width: 450px; margin: auto; background: #181818; padding: 30px; border-radius: 20px; border: 1px solid #282828; }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .on { background: #1db95422; color: #1DB954; border: 1px solid #1DB954; }
        .off { background: #ff555522; color: #ff5555; border: 1px solid #ff5555; }
        input, button { margin: 10px 0; padding: 14px; border-radius: 10px; border: none; width: 100%; box-sizing: border-box; font-size: 16px; }
        input { background: #282828; color: white; border: 1px solid #3e3e3e; }
        button { background: #1DB954; color: white; cursor: pointer; font-weight: bold; }
        .tag { display: inline-block; background: #333; padding: 8px 15px; margin: 5px; border-radius: 25px; cursor: pointer; font-size: 13px; }
        .tag:hover { background: #ff5555; }
        #result { margin-top: 25px; }
        a { color: #1DB954; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hit Maker</h1>
        <div id="status" class="off">Not Connected</div>
        <button onclick="window.location.href='/login'" style="background:white; color:black;">Connect Spotify</button>
        
        <hr style="border: 0.5px solid #333; margin: 25px 0;">
        
        <input type="text" id="genreIn" placeholder="Type genre (pop, rock) & Enter">
        <div id="tags"></div>

        <button onclick="generate()" style="margin-top:20px;">Generate Playlist</button>
        <div id="result"></div>
    </div>

    <script>
        let genres = [];

        window.onload = async () => {
            const res = await fetch('/check-auth');
            const data = await res.json();
            if (data.loggedIn) {
                const s = document.getElementById('status');
                s.innerText = "Connected ✅";
                s.className = "on";
            }
        };

        document.getElementById('genreIn').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim().toLowerCase();
                if (val && !genres.includes(val) && genres.length < 5) {
                    genres.push(val);
                    render();
                }
                e.target.value = '';
            }
        });

        function render() {
            document.getElementById('tags').innerHTML = genres.map((g, i) => 
                `<span class="tag" onclick="remove(${i})">${g} ×</span>`
            ).join('');
        }

        function remove(i) { genres.splice(i, 1); render(); }

        async function generate() {
            if (genres.length === 0) return alert("Add at least one genre!");
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "Creating... ✨";

            try {
                const response = await fetch(`/generate-playlist?genres=${genres.join(',')}`);
                const data = await response.json();
                if(data.success) {
                    resDiv.innerHTML = `<a href="${data.url}" target="_blank">Success! View Playlist ➔</a>`;
                } else {
                    resDiv.innerHTML = `<div style="color:#ff5555">Error: ${data.error}</div>`;
                }
            } catch (err) { resDiv.innerHTML = "Error connecting to server."; }
        }
    </script>
</body>
</html>
