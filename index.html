<!DOCTYPE html>
<html>
<head>
    <title>Spotify Hit Maker Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 30px; }
        .container { max-width: 500px; margin: auto; background: #181818; padding: 30px; border-radius: 15px; border: 1px solid #282828; }
        
        #authStatus { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .logged-in { background: #1db95422; color: #1DB954; border: 1px solid #1DB954; }
        .logged-out { background: #ff555522; color: #ff5555; border: 1px solid #ff5555; }

        input, select, button { margin: 10px 0; padding: 12px; border-radius: 8px; border: none; width: 100%; box-sizing: border-box; font-size: 15px; }
        input, select { background: #282828; color: white; }
        
        button { background: #1DB954; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1ed760; transform: translateY(-2px); }
        .login-btn { background: white; color: black; margin-bottom: 20px; }

        .genre-tag { 
            display: inline-block; background: #333; color: white; 
            padding: 6px 15px; margin: 5px 5px 0 0; border-radius: 20px; 
            cursor: pointer; font-size: 13px; border: 1px solid #444;
        }
        .genre-tag:hover { background: #ff5555; border-color: #ff5555; }
        #result { margin-top: 25px; min-height: 50px; }
        a { color: #1DB954; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hit Maker Pro</h1>
        
        <div id="authStatus" class="logged-out">Checking Connection...</div>
        <a href="/login"><button class="login-btn">Connect Spotify Account</button></a>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <div style="text-align: left; font-size: 14px; margin-bottom: 5px; color: #b3b3b3;">Genres (Press Enter to add, click to remove):</div>
        <input type="text" id="genreInput" list="genreList" placeholder="e.g. rock, techno, indie-pop">
        <datalist id="genreList">
            <option value="pop"> <option value="rock"> <option value="hip-hop"> 
            <option value="indie"> <option value="techno"> <option value="jazz">
            <option value="classical"> <option value="dance"> <option value="alt-rock">
        </datalist>
        <div id="selectedGenres" style="text-align: left; margin-bottom: 15px;"></div>

        <select id="mood">
            <option value="0.8">Happy / High Energy</option>
            <option value="0.3">Chill / Relaxed</option>
            <option value="0.1">Deep / Somber</option>
            <option value="0.5">Neutral / Focus</option>
        </select>

        <button onclick="generate()">Generate Playlist</button>
        <div id="result"></div>
    </div>

    <script>
        let genres = [];

        // Check Login Status on Page Load
        window.onload = async () => {
            try {
                const res = await fetch('/check-auth');
                const data = await res.json();
                const statusDiv = document.getElementById('authStatus');
                if (data.loggedIn) {
                    statusDiv.innerText = "Spotify Connected ✅";
                    statusDiv.className = "logged-in";
                } else {
                    statusDiv.innerText = "Spotify Not Connected ❌";
                    statusDiv.className = "logged-out";
                }
            } catch (e) { console.error("Auth check failed"); }
        };

        // Add Genre on Enter
        document.getElementById('genreInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim().toLowerCase();
                if (val && !genres.includes(val) && genres.length < 5) {
                    genres.push(val);
                    renderGenres();
                }
                e.target.value = '';
            }
        });

        function renderGenres() {
            const container = document.getElementById('selectedGenres');
            container.innerHTML = genres.map((g, i) => 
                `<span class="genre-tag" onclick="removeGenre(${i})">${g} ×</span>`
            ).join('');
        }

        function removeGenre(index) {
            genres.splice(index, 1);
            renderGenres();
        }

        async function generate() {
            const resultDiv = document.getElementById('result');
            if (genres.length === 0) return alert("Add at least one genre!");

            resultDiv.innerHTML = "Creating magic... ✨";

            try {
                const res = await fetch(`/generate-playlist?genres=${genres.join(',')}&mood=${document.getElementById('mood').value}`);
                const data = await res.json();
                
                if(data.success) {
                    resultDiv.innerHTML = `<a href="${data.url}" target="_blank">Success! Click to open Playlist ➔</a>`;
                } else {
                    // Safe error display
                    resultDiv.innerHTML = `<span style="color:#ff5555">Error: ${data.error}</span>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span style="color:#ff5555">Server Error. Please refresh and try again.</span>`;
            }
        }
    </script>
</body>
</html>
